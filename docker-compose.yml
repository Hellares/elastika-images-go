version: '3.8'

services:
  # ========================================
  # SERVIDOR GO (BACKEND)
  # ========================================
  images-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: images-server
    hostname: images-server
    restart: unless-stopped
    environment:
      PORT: 3500
      NODE_ENV: production
      IMAGES_DIR: /var/www/images
      API_KEY: ${IMAGES_API_KEY:-mathidev369}
      # URL público ahora es Nginx
      PUBLIC_URL: ${PUBLIC_URL:-http://86.48.26.221}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-20}
      VERSION: 1.0.0
      # Confiar en Nginx proxy
      TRUSTED_PROXIES: "172.16.0.0/12,10.0.0.0/8,127.0.0.1"
      # Nginx maneja CORS
      ALLOWED_ORIGINS: "*"
    # Solo puerto interno - NO expuesto públicamente
    expose:
      - "3500"
    volumes:
      - images_data:/var/www/images
      - ./logs:/app/logs
    networks:
      - images-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3500/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ========================================
  # NGINX (FRONTEND/PROXY)
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: images-nginx
    restart: unless-stopped
    ports:
      # Puerto público - solo Nginx expuesto
      - "${HOST_PORT:-3500}:80"
      - "443:443"  # Para SSL futuro
    volumes:
      # Configuración de Nginx
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # Archivos estáticos para servir directamente
      - images_data:/var/images:ro  # Solo lectura
      # Logs de Nginx
      - ./nginx/logs:/var/log/nginx
      # SSL certificates (para futuro)
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - elastika-network
    depends_on:
      - images-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Variables de entorno para Nginx
    environment:
      - NGINX_HOST=_
      - NGINX_PORT=80

# ========================================
# VOLÚMENES PERSISTENTES
# ========================================
volumes:
  images_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/images

# ========================================
# RED PERSONALIZADA
# ========================================
networks:
  elastika-network:
    external: true
      